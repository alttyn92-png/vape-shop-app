<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cart</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <main class="container">
      <header class="topbar">
        <div class="logo">Your Cart</div>
        <a href="./index.html" class="btn secondary">Back</a>
      </header>

      <section id="cartList" class="stack"></section>

      <section class="totals">
        <div>Total: <strong id="total">0 RUB</strong></div>
        <div class="muted" id="emptyHint" style="margin-top: 8px; display: none">
          Cart is empty. Add products on the main page.
        </div>
        <div style="margin-top: 12px">
          <a class="btn" href="./order.html" id="checkoutBtn">Checkout</a>
        </div>
      </section>
    </main>

    <script>
      const tg = window.Telegram?.WebApp;
      tg?.ready();
      tg?.expand();

      const cartKey = "neon_cart_items";
      const cartList = document.getElementById("cartList");
      const totalEl = document.getElementById("total");
      const emptyHint = document.getElementById("emptyHint");
      const checkoutBtn = document.getElementById("checkoutBtn");

      const readCart = () => JSON.parse(localStorage.getItem(cartKey) || "[]");
      const saveCart = (items) => localStorage.setItem(cartKey, JSON.stringify(items));

      function render() {
        const cart = readCart();
        const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
        totalEl.textContent = `${total} RUB`;

        if (!cart.length) {
          cartList.innerHTML = "";
          emptyHint.style.display = "block";
          checkoutBtn.classList.add("danger");
          checkoutBtn.style.pointerEvents = "none";
          checkoutBtn.style.opacity = "0.55";
          return;
        }

        emptyHint.style.display = "none";
        checkoutBtn.classList.remove("danger");
        checkoutBtn.style.pointerEvents = "auto";
        checkoutBtn.style.opacity = "1";

        cartList.innerHTML = cart
          .map(
            (item) => `
            <article class="cart-item">
              <div>
                <strong>${item.name}</strong>
                <div class="muted">${item.flavor} | ${item.puffs} puffs</div>
                <div>${item.price} RUB x ${item.quantity} = ${item.price * item.quantity} RUB</div>
              </div>
              <div class="qty-control">
                <button class="btn secondary js-dec" data-key="${item.key}">-</button>
                <span>${item.quantity}</span>
                <button class="btn js-inc" data-key="${item.key}">+</button>
              </div>
            </article>
          `
          )
          .join("");
      }

      cartList.addEventListener("click", (e) => {
        const incBtn = e.target.closest(".js-inc");
        const decBtn = e.target.closest(".js-dec");
        if (!incBtn && !decBtn) return;

        const key = (incBtn || decBtn).dataset.key;
        const cart = readCart();
        const item = cart.find((x) => x.key === key);
        if (!item) return;

        if (incBtn) item.quantity += 1;
        if (decBtn) item.quantity -= 1;

        const filtered = cart.filter((x) => x.quantity > 0);
        saveCart(filtered);
        render();
      });

      render();
    </script>
  </body>
</html>
