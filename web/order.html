<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <main class="container">
      <header class="topbar">
        <div class="logo">Checkout</div>
        <a href="./cart.html" class="btn secondary">Back to Cart</a>
      </header>

      <section class="stack">
        <div>
          <label for="phone">Phone</label>
          <input id="phone" placeholder="+7..." />
        </div>
        <div>
          <label for="address">Delivery Address</label>
          <input id="address" placeholder="Street, house, apartment..." />
        </div>
        <div>
          <label for="comment">Comment (optional)</label>
          <textarea id="comment" placeholder="Doorphone, floor, etc."></textarea>
        </div>
      </section>

      <section class="totals">
        <div>Items count: <strong id="itemsCount">0</strong></div>
        <div>Total: <strong id="total">0 RUB</strong></div>
        <div style="margin-top: 12px">
          <button class="btn" id="submitOrder">SEND ORDER</button>
        </div>
      </section>
    </main>

    <script>
      const tg = window.Telegram?.WebApp;
      tg?.ready();
      tg?.expand();

      const cartKey = "neon_cart_items";
      const phoneEl = document.getElementById("phone");
      const addressEl = document.getElementById("address");
      const commentEl = document.getElementById("comment");
      const itemsCountEl = document.getElementById("itemsCount");
      const totalEl = document.getElementById("total");
      const submitBtn = document.getElementById("submitOrder");

      const readCart = () => JSON.parse(localStorage.getItem(cartKey) || "[]");
      const cart = readCart();
      const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
      const itemCount = cart.reduce((sum, item) => sum + item.quantity, 0);

      itemsCountEl.textContent = String(itemCount);
      totalEl.textContent = `${total} RUB`;

      submitBtn.addEventListener("click", () => {
        if (!cart.length) {
          alert("Cart is empty.");
          return;
        }

        const phone = phoneEl.value.trim();
        const address = addressEl.value.trim();
        const comment = commentEl.value.trim();

        if (!phone || !address) {
          alert("Please fill in phone and address.");
          return;
        }

        const payload = {
          source: "mini_app",
          items: cart,
          customer: {
            phone,
            address,
            comment,
          },
          total,
          created_at: new Date().toISOString(),
        };

        const json = JSON.stringify(payload);
        if (!tg) {
          console.log("Telegram WebApp unavailable. Payload:", json);
          alert("Telegram WebApp object is not available.");
          return;
        }

        tg.sendData(json);
        localStorage.removeItem(cartKey);
        tg.close();
      });
    </script>
  </body>
</html>
