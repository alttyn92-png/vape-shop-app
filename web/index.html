<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Store</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <main class="container">
      <header class="topbar">
        <div class="logo">VDOH.VYDOH</div>
        <a href="./cart.html" class="btn">
          Cart <span class="badge" id="cartCounter">0</span>
        </a>
      </header>

      <section class="grid" id="catalog"></section>
    </main>

    <script>
      const tg = window.Telegram?.WebApp;
      tg?.ready();
      tg?.expand();

      const storeProducts = [
        {
          id: 1,
          name: "ELFBAR BC10000",
          puffs: 10000,
          price: 7500,
          photo:
            "https://images.unsplash.com/photo-1523293915678-d126868e96f8?auto=format&fit=crop&w=900&q=80",
          flavors: ["Ягодный микс", "Киви маракуйя"],
        },
        {
          id: 2,
          name: "LOST MARY",
          puffs: 12000,
          price: 8000,
          photo:
            "https://images.unsplash.com/photo-1585386959984-a4155224a1ad?auto=format&fit=crop&w=900&q=80",
          flavors: ["Черника", "Вишня"],
        },
        {
          id: 3,
          name: "HQD",
          puffs: 9000,
          price: 6500,
          photo:
            "https://images.unsplash.com/photo-1608481337062-4093bf3ed404?auto=format&fit=crop&w=900&q=80",
          flavors: ["Мята", "Арбуз"],
        },
      ];

      const cartKey = "neon_cart_items";
      const catalog = document.getElementById("catalog");
      const cartCounter = document.getElementById("cartCounter");

      const readCart = () => {
        try {
          return JSON.parse(localStorage.getItem(cartKey) || "[]");
        } catch (e) {
          return [];
        }
      };

      const saveCart = (items) => localStorage.setItem(cartKey, JSON.stringify(items));

      const refreshCounter = () => {
        const totalQty = readCart().reduce((sum, item) => sum + item.quantity, 0);
        cartCounter.textContent = String(totalQty);
      };

      const addToCart = (product, flavor) => {
        const cart = readCart();
        const key = `${product.id}__${flavor}`;
        const existing = cart.find((item) => item.key === key);
        if (existing) {
          existing.quantity += 1;
        } else {
          cart.push({
            key,
            productId: product.id,
            name: product.name,
            puffs: product.puffs,
            price: product.price,
            flavor,
            quantity: 1,
          });
        }
        saveCart(cart);
        refreshCounter();
      };

      const cardHtml = (product) => `
        <article class="card" data-card-id="${product.id}">
          <img src="${product.photo}" alt="${product.name}" />
          <div class="card-body">
            <h3 class="title">${product.name}</h3>
            <div class="meta">${product.puffs} puffs</div>
            <div class="price">${product.price} RUB</div>

            <button class="btn js-open-flavors" data-id="${product.id}">To Cart</button>

            <div class="flavor-panel" id="flavor-${product.id}">
              <div class="muted">Select flavor</div>
              <div class="flavor-row">
                <select id="select-${product.id}">
                  ${product.flavors.map((f) => `<option value="${f}">${f}</option>`).join("")}
                </select>
                <button class="btn js-add" data-id="${product.id}">+</button>
              </div>
            </div>
          </div>
        </article>
      `;

      const renderProducts = (products) => {
        catalog.innerHTML = products.map(cardHtml).join("");
      };

      catalog.addEventListener("click", (e) => {
        const openBtn = e.target.closest(".js-open-flavors");
        const addBtn = e.target.closest(".js-add");

        if (openBtn) {
          const id = Number(openBtn.dataset.id);
          const panel = document.getElementById(`flavor-${id}`);
          const card = document.querySelector(`[data-card-id="${id}"]`);
          panel.classList.toggle("show");
          card.classList.toggle("active");
          return;
        }

        if (addBtn) {
          const id = Number(addBtn.dataset.id);
          const product = storeProducts.find((p) => p.id === id);
          const flavor = document.getElementById(`select-${id}`).value;
          addToCart(product, flavor);
        }
      });

      refreshCounter();
      renderProducts(storeProducts);
    </script>
  </body>
</html>
